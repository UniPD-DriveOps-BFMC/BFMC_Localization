rgb_map_matching_node:
  ros__parameters:
    image_topic:          /oak/rgb/image_rect
    camera_info_topic:    /oak/rgb/camera_info
    gps_pose_topic:       /automobile/gps/base_pose

    map_match_pose_topic: /automobile/map_match/base_pose
    lane_mask_topic:      /automobile/map_match/lane_mask

    map_frame:    map
    base_frame:   base_link
    camera_frame: oak_rgb_camera_optical_frame

    graphml_map_file: Competition_track_graph.graphml
    png_map_file:     Competition_track_graph.png

    # Lane marking detection thresholds (HSV)
    white_threshold:      180
    saturation_threshold: 80

    # GPS-constrained search radius (metres) — GPS is ±15 cm so 3 m is generous
    gps_search_radius_m: 3.0

    # PNG Y-axis: true = image row 0 is world Y_max (standard image convention)
    map_y_flipped: true

    # Minimum RANSAC inlier ratio (0–1) to accept a match
    min_correlation: 0.25

    # Published pose uncertainty
    pose_xy_stddev_m:    0.20
    pose_yaw_stddev_rad: 0.30
