ekf_filter_node_map:
  ros__parameters:
    frequency: 10.0
    sensor_timeout: 2.0
    two_d_mode: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    publish_tf: true
    publish_acceleration: false

    # --- Local EKF output ---
    odom0: /odometry/local
    odom0_config: [
      false, false, false,
      false, false, false,
      true,  false, false,
      false, false, true,
      false, false, false
    ]
    odom0_queue_size: 10
    odom0_differential: false
    odom0_relative: false

    # --- Map matching pose (xy_stddev=0.30 m, yaw_stddev=0.50 rad) ---
    pose0: /automobile/map_match/base_pose
    pose0_config: [
      true,  true,  false,
      false, false, true,
      false, false, false,
      false, false, false,
      false, false, false
    ]
    pose0_queue_size: 5
    pose0_differential: false
    pose0_relative: false
    pose0_rejection_threshold: 3.0

    # --- Sign-based position (covariance grows with detection distance) ---
