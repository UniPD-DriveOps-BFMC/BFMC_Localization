ekf_filter_node_map:
  ros__parameters:
    frequency: 10.0
    # Must exceed GPS delay (~1 s) so the filter does not reset while waiting.
    sensor_timeout: 2.0
    two_d_mode: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    # world_frame: map  →  this EKF estimates in the map frame and
    # publishes the map → odom correction TF.
    world_frame: map

    publish_tf: true
    publish_acceleration: false

    # --- GPS position (dynamic covariance set by gps_tag_to_base_node) ---
    # Frequency: 10 Hz, delay compensated in header stamp.
    # Trust x, y only — yaw comes from local odometry, not GPS.
    pose0: /automobile/gps/base_pose
    pose0_config: [
      true,  true,  false,
      false, false, false,
      false, false, false,
      false, false, false,
      false, false, false
    ]
    pose0_queue_size: 10
    pose0_differential: false
    pose0_relative: false
    pose0_rejection_threshold: 3.0

    # --- Map matching pose (fixed covariance: xy_stddev=0.30 m, yaw_stddev=0.50 rad) ---
    # Trust x, y and yaw — map matching provides full 2D pose.
    pose1: /automobile/map_match/base_pose
    pose1_config: [
      true,  true,  false,
      false, false, true,
      false, false, false,
      false, false, false,
      false, false, false
    ]
    pose1_queue_size: 5
    pose1_differential: false
    pose1_relative: false
    pose1_rejection_threshold: 3.0

    process_noise_covariance: [
